<!DOCTYPE html>
<html>
<head>
    <title>Vedastra AI</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 500px;
            margin: auto;
            margin-top: 30px;
        }

        .chat-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            height: 400px;
            overflow-y: scroll;
        }

        .user {
            text-align: right;
            margin: 10px;
        }

        .ai {
            text-align: left;
            margin: 10px;
        }

        .bubble {
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
        }

        .user .bubble {
            background: #22c55e;
        }

        .ai .bubble {
            background: #334155;
        }

        input {
            width: 75%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 Vedastra AI</h2>

    <div class="chat-box">
        {% for sender, message in chat_history %}
            <div class="{{ sender }}">
                <div class="bubble">{{ message }}</div>
            </div>
        {% endfor %}
    </div>

    <form method="post">
        <input type="text" name="question" placeholder="Type your message..." required>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
